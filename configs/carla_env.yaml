carla:
  host: "127.0.0.1"
  port: 2000
  tm_port: 8000
  timeout: 60.0
  sync: true
  fixed_delta: 0.05
  no_rendering: false

  map: "Town03"



vehicle:
  filter: "vehicle.tesla.model3"
  spawn_point: 1
  destination_point: 30 
  role_name: "hero"

spectator:
  lock_on_spawn: true
  keep_reapply_each_tick: true
  follow_distance: 9.0
  height: 4.5
  pitch: -18.0

camera:
  width: 640
  height: 360
  fov: 90.0

weather:
  random: false
  preset: "ClearNoon"

traffic_lights:
  red_time: 10.0
  green_time: 15.0
  yellow_time: 3.0

cil:
  target_speed_kmh: 30
  max_throttle: 0.8
  max_brake: 0.80
  steer_smoothing: 0.85
  nav_agent_type: "basic"
  command_prep_time_s: 1.2
  command_trigger_min_m: 6.0
  command_trigger_max_m: 18.0
  recovery_interval_frames: 100
  recovery_duration_frames: 10
  recovery_steer_offset: 0.3
  use_pure_pursuit: true
  use_carla_waypoints: true
  lane_constrain_blended: false     
  lane_constrain_strength: 0.2

yolo:
  backend: "tm"
  nav_agent_type: "basic"
  disable_autopilot_red_light: true
  tracker: "botsort.yaml"
  inference_every_n_ticks: 3
  inference_imgsz: 0
  debug_window: false
  debug_overlay: true
  show_red_light_rois: true

gtnet:
  model_path: "models/gtnet_full.pt"
  history_frames: 40
  expected_dt: 0.05
  adjacency_mode: "checkpoint"
  fixed_adjacency_radius_m: 100.0
  max_actor_distance_m: 100.0
  inference_every_n_ticks: 2
  draw_debug: false

traffic_spawn:
  vehicle_count: 20
  bike_count: 10
  motorbike_count: 10
  pedestrian_count: 10
  npc_enable_autopilot: true

recording:
  enabled: false
  output_path: "outputs/2min_2.mp4"
  fps: 20.0
  duration_sec: 600
  codec: "mp4v"

runtime:
  ticks: 0
  tick_interval: 0.05
  fps_log_interval_ticks: 20
  cil_enable_hud: false
  cil_enable_route_map: false
  cil_opencv_route_map: false
  cil_world_waypoint_debug: false
  cil_enable_telemetry_csv: false
  cil_profile_tick_timing: false
  cil_profile_log_interval_ticks: 60
  eval_online: false
