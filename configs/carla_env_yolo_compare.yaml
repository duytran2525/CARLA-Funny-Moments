carla:
  host: "127.0.0.1"
  port: 2000
  tm_port: 8000
  timeout: 60.0
  sync: true
  fixed_delta: 0.03
  no_rendering: false

  map: "Town03"



vehicle:
  filter: "vehicle.tesla.model3"
  spawn_point: 1 
  destination_point: 15
  role_name: "hero"

spectator:
  lock_on_spawn: true
  keep_reapply_each_tick: false
  follow_distance: 9.0
  height: 4.5
  pitch: -18.0

camera:
  width: 640
  height: 360
  fov: 90.0

weather:
  random: false
  preset: "ClearNoon"

cil:
  target_speed_kmh: 30
  max_throttle: 0.8
  max_brake: 0.80
  steer_smoothing: 0.85
  nav_agent_type: "basic"
  command_prep_time_s: 1.8
  command_trigger_min_m: 9.0
  command_trigger_max_m: 24.0
  recovery_interval_frames: 100
  recovery_duration_frames: 10
  recovery_steer_offset: 0.3
  use_pure_pursuit: true

yolo:
  # backend:
  # - "tm": native CARLA Traffic Manager autopilot
  # - "planner": BasicAgent/BehaviorAgent route planner
  backend: "planner"
  # Chỉ dùng khi backend="planner"
  nav_agent_type: "basic"
  disable_autopilot_red_light: true
  # Tracker dùng bởi Ultralytics model.track().
  # Chạy 2 lần với "botsort.yaml" và "bytetrack.yaml" để so sánh tracking metrics.
  tracker: "botsort.yaml"
  inference_every_n_ticks: 1
  inference_imgsz: 0
  # Cửa sổ OpenCV hiển thị kết quả detect (bbox / HUD tùy debug_overlay).
  # - agent=yolo_detect: bật/tắt màn hình debug YOLO.
  # - agent=cil_yolo: cửa sổ "CARLA CIL + YOLO"; khi chạy bấm 'y' để bật/tắt. CLI: --no-yolo-visualize.
  debug_window: true
  # Khi debug_window=true:
  # true  = vẽ box, HUD, corridor như giao diện debug cũ.
  # false = chỉ hiện raw camera feed.
  debug_overlay: true

traffic_spawn:
  vehicle_count: 0
  bike_count: 0
  motorbike_count: 0
  pedestrian_count: 0
  npc_enable_autopilot: true

recording:
  enabled: false
  output_path: "outputs/2min_2.mp4"
  fps: 30.0
  duration_sec: 600
  codec: "mp4v"

runtime:
  ticks: 0
  tick_interval: 0.03
  fps_log_interval_ticks: 30
  cil_enable_hud: false
  cil_enable_route_map: false
  # cil_yolo OpenCV: YOLO = yolo.debug_window + phím 'y'; route map = cil_opencv_route_map + phím 'r'.
  cil_opencv_route_map: true
  cil_world_waypoint_debug: false
  cil_enable_telemetry_csv: false
  cil_profile_tick_timing: false
  cil_profile_log_interval_ticks: 60
