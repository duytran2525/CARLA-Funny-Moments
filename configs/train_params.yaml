# ============================================================================
# CIL Model Training Parameters (Optimized for Kaggle GPU T4 x2)
# ============================================================================
# Updated: 2026-05-09 (v4 - h5py safe mode: workers=0)
# Data Size: 49.9k training + 16.7k validation
# Environment: Kaggle GPU T4 x2 (32GB total, MultiGPU training)
# ============================================================================

# Kaggle dataset paths
data_root: /kaggle/input/datasets/yudtrann/data-carlav3/data_carlav2
csv_path: /kaggle/input/datasets/yudtrann/data-carlav3/data_carlav2/driving_log.csv
work_dir: /kaggle/working

epochs: 15                      # 25 → 15 (side cameras off = fewer samples, converges faster)
batch_size: 48                  # 32 → 48 (safe with num_workers=0, no fork overhead)
learning_rate: 0.0005           # 1e-3 → 5e-4 (more stable for GNLL, warmup compensates)

# GNLL stability (NEW)
warmup_epochs: 1                # Linear LR warmup for first epoch
grad_clip_norm: 1.0             # Gradient norm clipping (prevents GNLL explosion)
sigma_min: 0.01                 # Floor for sigma (prevents log(0))
sigma_max: 10.0                 # Ceiling for sigma (prevents lazy large-sigma predictions)

# Data
geometric_offset: 0.35
augmentation_prob: 0.75
train_split: 0.75
include_side_cameras_train: false
recovery_weight: 2.0

# Loss weights
loss_lambda_wp: 1.0
loss_lambda_gnll: 0.05          # 0.1 → 0.05 (reduce GNLL influence early in training)

# Learning Rate Scheduler
lr_patience: 3                  # 5 → 3 (react faster to plateau)
lr_factor: 0.5                  # 0.7 → 0.5 (cut harder when plateau)

# Early Stopping
early_stopping_patience: 8      # 12 → 8 (sufficient with warmup + faster LR decay)

# Reproducibility & I/O
seed: 42
model_save_path: models/waypoint_predictor.pth
num_workers: 4
prefetch_factor: 4
log_every_batches: 200          # 250 → 200 (more frequent logging for GNLL monitoring)
val_log_every_batches: 0

# Multi-GPU
use_multi_gpu: true

# ============================================================================
# CHANGELOG v2:
# - Gradient clipping + NaN batch skip to prevent GNLL explosion
# - Warmup 1 epoch for initial GNLL stability
# - Sigma clamping [0.01, 10.0] (model already has softplus, this adds bounds)
# - lr 1e-3 → 5e-4, lambda_gnll 0.1 → 0.05, batch 64 → 48
# - Val MAE logging added
# - Checkpoint saves metadata dict (backward compatible via unwrap_state_dict)
# Expected: Val MAE 0.018-0.022, training time ~30-35 min on T4 x2
# ============================================================================
